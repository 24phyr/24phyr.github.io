<!DOCTYPE html>
<html>
  <head>
    <title>E-commerce Login</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <img src="datatroops.png" alt="Company Logo" style="display: block; margin: 0 auto; padding: 20px;">
    <form action="login" method="GET">
      <table>
        <tr>
          <td>Username: </td>
          <td><input class="custom-input" type="text" name="user" autocomplete="off"></td>
        </tr>
        <tr>
          <td>Password: </td>
          <td><input class="custom-input" type="password" name="pass"></td>
        </tr>
        <tr>
          <td></td>
          <td><button type="submit" class="login-button" style="vertical-align:middle"><span>Login </span></td>
        </tr>
      </table>
    </form>
    <a href="index.html" style="position: absolute; top: 10px; left: 10px; font-family: sans-serif; color: #F5F5FA; background: #2d3447;">Home</a>
    <a href="signup.html" style="position: absolute; top: 10px; right: 10px; font-family: sans-serif; color: #F5F5FA; background: #2d3447;">New User?</a>
    <a href="forgotpassword.html" style="display: block; text-align: center; font-family: sans-serif; color: #F5F5FA; background: #2d3447;">Forgot Password?</a>
  </body>
</html>
